<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos-/midia-query.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <title>Login</title>
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">

            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem vindo(a). Faça login para acessar sua conta.</p>
                
                <form action="login.php" method="post" autocomplete="on">  
                     
                    <div id="campo">
                        <span class="material-symbols-outlined">person</span>
                        <input type="email" name="login" id="ilogin" autocomplete="email" required placeholder="Login"><label for="ilogin">Login</label>
                        
                    </div>
                    <div id="campo">
                        <span class="material-symbols-outlined">Lock</span>
                        <input type="password" name="senha" id="isenha" autocomplete="current-password" required placeholder="Senha" minlength="8" maxlength="15"><label for="isenha">Senha</label>
                    </div>
                    
                    <input type="submit" value="Entrar">
                    <a href="esqueci.html" class="botao">Esqueci a senha <span class="material-symbols-outlined">Passkey</span></a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
